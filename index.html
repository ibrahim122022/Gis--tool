<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أداة الرسم المكاني</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    :root {
      --border: #ccc;
      --bg: #f9f9f9;
      --primary: #0078d7;
      --secondary: #eee;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: #333;
      display: flex;
    }

    /* الشريط الجانبي */
    aside {
      width: 220px;
      height: 100vh;
      background-color: #fff;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    aside h2 {
      margin: 0 0 16px;
      font-size: 18px;
      color: var(--primary);
    }

    aside button {
      margin: 6px 0;
      padding: 10px;
      border: 1px solid var(--border);
      background-color: var(--secondary);
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }

    aside button:hover {
      background-color: #ddd;
    }

    /* المحتوى الرئيسي */
    main {
      flex: 1;
      padding: 24px;
    }

    main h1 {
      font-size: 26px;
      margin-bottom: 12px;
      color: var(--primary);
    }

    main p {
      line-height: 1.6;
      margin-bottom: 12px;
    }

    /* الفوتر */
    footer {
      text-align: center;
      padding: 12px;
      border-top: 1px solid var(--border);
      background-color: #fff;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- الشريط الجانبي -->
  <aside>
    <h2>الأدوات</h2>
    <button>أداة 1</button>
    <button>أداة 2</button>
    <button>أداة 3</button>
    <button>أداة 4</button>
  </aside>

  <!-- المحتوى الرئيسي -->
  <main>
    <h1>مرحباً بك في أداة الرسم المكاني</h1>
    <p>هذه الصفحة منظمة بالكامل لتجربة الأدوات بشكل سهل وواضح.</p>
    <p>استخدم الشريط الجانبي للتنقل بين الأدوات المختلفة.</p>
  </main>

  <!-- الفوتر -->
  <footer>
    &copy; 2026 أداة الرسم المكاني - جميع الحقوق محفوظة
  </footer>
</body>
</html>
