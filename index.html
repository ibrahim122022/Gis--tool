  /* ---------- Layers UI Rendering ---------- */
  function eyeOpenIcon(){ return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`; }
  function eyeClosedIcon(){ return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`; }
  function trashIcon(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`; }

  function renderLayerList(){
    const container = document.getElementById('layerList');
    container.innerHTML = '';
    state.layers.forEach(layer => {
      const row = document.createElement('div');
      row.className = `layer-row ${layer.id===state.activeLayerId?'active':''}`;
      row.addEventListener('click', ()=>{
        state.activeLayerId=layer.id;
        renderLayerList();
      });
      
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.background = layer.color;
      swatch.addEventListener('click', e=>{
        L.DomEvent.stopPropagation(e);
        pushStateToUndo();
        const idx = palette.indexOf(layer.color);
        layer.color = palette[(idx+1)%palette.length];
        renderLayerList(); renderFeatures(); scheduleSave();
      });
      
      const nameSpan = document.createElement('span');
      nameSpan.className = 'lname';
      nameSpan.textContent = layer.name;
      
      const countSpan = document.createElement('span');
      countSpan.className = 'lcount';
      countSpan.textContent = `(${layer.features.length})`;
      
      const visBtn = document.createElement('button');
      visBtn.className = 'icon-btn';
      visBtn.innerHTML = layer.visible ? eyeOpenIcon() : eyeClosedIcon();
      visBtn.addEventListener('click', e=>{
        L.DomEvent.stopPropagation(e);
        layer.visible = !layer.visible;
        renderLayerList(); renderFeatures(); scheduleSave();
      });
      
      row.appendChild(swatch); row.appendChild(nameSpan); row.appendChild(countSpan); row.appendChild(visBtn);
      
      if(state.layers.length > 1){
        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn';
        delBtn.innerHTML = trashIcon();
        delBtn.addEventListener('click', e=>{
          L.DomEvent.stopPropagation(e);
          if(confirm(`هل تريد حذف الطبقة "${layer.name}" بجميع عناصرها؟`)){
            pushStateToUndo();
            if(layerGroups[layer.id]) { map.removeLayer(layerGroups[layer.id]); delete layerGroups[layer.id]; }
            state.layers = state.layers.filter(l=>l.id!==layer.id);
            if(state.activeLayerId===layer.id) state.activeLayerId = state.layers[0].id;
            if(selection && selection.layerId===layer.id) selection=null;
            closeMobileEditPad(); renderLayerList(); renderFeatures(); renderAttrPanel(); scheduleSave();
          }
        });
        row.appendChild(delBtn);
      }
      container.appendChild(row);
    });
  }

  document.getElementById('addLayerBtn').addEventListener('click', ()=>{
    const name = prompt('أدخل اسم الطبقة الجديدة:', `طبقة ${state.layers.length+1}`);
    if(!name) return;
    pushStateToUndo();
    const id = 'L' + uid();
    const color = palette[state.nextColorIdx++ % palette.length];
    state.layers.push({id, name, color, visible:true, features:[]});
    state.activeLayerId = id;
    renderLayerList(); renderFeatures(); scheduleSave();
  });

  /* ---------- Attributes UI & Editing ---------- */
  function renderAttrPanel(){
    const container = document.getElementById('attrContent');
    if(!selection){
      container.innerHTML = '<div class="empty-state">اختر عنصر من الخريطة<br>لعرض وتعديل خصائصه</div>';
      return;
    }
    const f = getFeature(selection.layerId, selection.featureId);
    if(!f){ container.innerHTML = ''; return; }
    
    let html = `<div class="attr-block">`;
    let typeAr = f.type==='point'?'نقطة':f.type==='line'?'خط':f.type==='polygon'?'مضلع':f.type==='rectangle'?'مستطيل':'دائرة';
    html += `<div class="ftype">${typeAr} # ${f.id}</div>`;
    
    if(f.type==='rectangle'){
      html += `<div class="rect-edit-grid">
        <div><label>العرض (م)</label><input type="number" id="edW" value="${f.rect.width}" step="0.1"></div>
        <div><label>الطول (م)</label><input type="number" id="edL" value="${f.rect.length}" step="0.1"></div>
      </div>
      <div style="margin-top:4px;"><label style="font-size:10px;color:var(--text-muted)">الدوران (°)</label><input type="number" id="edR" value="${f.rect.rotation}" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px;font-family:var(--mono);font-size:12px;margin-top:2px;"></div>`;
    }
    if(f.type==='circle'){
      html += `<div style="margin-top:6px;"><label style="font-size:10px;color:var(--text-muted)">نصف القطر (متر)</label><input type="number" id="edRad" value="${f.circle.radius}" step="0.1" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px;font-family:var(--mono);font-size:12px;margin-top:2px;"></div>`;
    }
    
    html += `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:6px;">`;
    if(f.type==='point') html += `<div class="stat-row">Lat: <b>${f.coords[0][0].toFixed(6)}</b></div><div class="stat-row">Lng: <b>${f.coords[0][1].toFixed(6)}</b></div>`;
    if(f.type==='line') html += `<div class="stat-row">الطول الكلي: <b>${pathLength(f.coords).toFixed(1)} م</b></div><div class="stat-row">النقاط: <b>${f.coords.length}</b></div>`;
    if(f.type==='polygon'||f.type==='rectangle'||f.type==='circle'){
      html += `<div class="stat-row">المحيط: <b>${pathPerimeter(f.coords).toFixed(1)} م</b></div>`;
      html += `<div class="stat-row">المساحة: <b>${polygonAreaMeters(f.coords).toFixed(1)} م²</b></div>`;
      html += `<div class="stat-row">عدد النقاط: <b>${f.coords.length}</b></div>`;
    }
    html += `</div></div>`;
    
    html += `<div class="section-title" style="margin-top:12px;">الحقول الوصفية</div>`;
    Object.keys(f.attrs).forEach(k=>{
      html += `<div class="field-row">
        <input type="text" class="key" value="${escapeHtml(k)}" data-orig="${escapeHtml(k)}">
        <input type="text" class="val" value="${escapeHtml(f.attrs[k])}" data-key="${escapeHtml(k)}">
        <button class="icon-btn del-attr" data-key="${escapeHtml(k)}" title="حذف الحقل">${trashIcon()}</button>
      </div>`;
    });
    html += `<button class="add-btn" id="addAttrBtn" style="padding:5px; font-size:11px;">+ إضافة حقل وصفى</button>`;
    html += `<button class="danger-btn" id="delFeatureBtn">حذف العنصر من الخريطة</button>`;
    
    container.innerHTML = html;
    
    if(f.type==='rectangle'){
      ['edW','edL','edR'].forEach(id=>{
        document.getElementById(id).addEventListener('focus', pushStateToUndo);
        document.getElementById(id).addEventListener('input', ()=>{
          f.rect.width = Math.max(0.01, parseFloat(document.getElementById('edW').value)||10);
          f.rect.length = Math.max(0.01, parseFloat(document.getElementById('edL').value)||20);
          f.rect.rotation = parseFloat(document.getElementById('edR').value)||0;
          syncRectCoords(f); renderFeatures(); scheduleSave();
        });
      });
    }
    if(f.type==='circle'){
      document.getElementById('edRad').addEventListener('focus', pushStateToUndo);
      document.getElementById('edRad').addEventListener('input', e=>{
        f.circle.radius = Math.max(0.01, parseFloat(e.target.value)||10);
        syncCircleCoords(f); renderFeatures(); scheduleSave();
      });
    }
    
    container.querySelectorAll('.field-row input.val').forEach(inp=>{
      inp.addEventListener('input', e=>{ f.attrs[e.target.dataset.key] = e.target.value; scheduleSave(); });
    });
    container.querySelectorAll('.field-row input.key').forEach(inp=>{
      inp.addEventListener('change', e=>{
        pushStateToUndo();
        const oldK = e.target.dataset.orig, newK = e.target.value.trim();
        if(!newK || oldK===newK) { e.target.value = oldK; return; }
        f.attrs[newK] = f.attrs[oldK]; delete f.attrs[oldK];
        renderAttrPanel(); scheduleSave();
      });
    });
    container.querySelectorAll('.del-attr').forEach(b=>{
      b.addEventListener('click', e=>{
        pushStateToUndo(); delete f.attrs[e.currentTarget.dataset.key];
        renderAttrPanel(); scheduleSave();
      });
    });
    document.getElementById('addAttrBtn').addEventListener('click', ()=>{
      const k = prompt('أدخل اسم الحقل الجديد:'); if(!k||!k.trim())return;
      if(f.attrs[k.trim()]!==undefined){ alert('الحقل موجود بالفعل!'); return; }
      pushStateToUndo(); f.attrs[k.trim()] = '';
      renderAttrPanel(); scheduleSave();
    });
    document.getElementById('delFeatureBtn').addEventListener('click', ()=>{
      if(confirm('هل أنت متأكد من حذف هذا العنصر نهائياً؟')){
        pushStateToUndo();
        const layer = getLayer(selection.layerId);
        layer.features = layer.features.filter(x=>x.id!==selection.featureId);
        selection = null; closeMobileEditPad();
        renderLayerList(); renderAttrPanel(); renderFeatures(); scheduleSave();
      }
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  document.getElementById('fitBtn').addEventListener('click', ()=>{
    const all=[];
    state.layers.forEach(l=>l.features.forEach(f=>f.coords.forEach(c=>all.push(c))));
    if(all.length) map.fitBounds(L.latLngBounds(all), {padding:[40,40]});
    else alert('لا توجد عناصر هندسية لعرضها كاملة.');
  });

  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const geojson = { type: "FeatureCollection", features: [] };
    state.layers.forEach(layer => {
      layer.features.forEach(f => {
        let geomType = f.type==='point'?'Point':f.type==='line'?'LineString':'Polygon';
        let geomCoords = [];
        if(f.type==='point') geomCoords = [f.coords[0][1], f.coords[0][0]];
        else if(f.type==='line') geomCoords = f.coords.map(c=>[c[1], c[0]]);
        else geomCoords = [f.coords.concat([f.coords[0]]).map(c=>[c[1], c[0]])];
        
        const props = Object.assign({ layer: layer.name, type: f.type }, f.attrs);
        if(f.type==='rectangle') props.rect_info = f.rect;
        if(f.type==='circle') props.circle_info = f.circle;
        
        geojson.features.push({ type:"Feature", properties: props, geometry: { type: geomType, coordinates: geomCoords } });
      });
    });
    
    const blob = new Blob([JSON.stringify(geojson, null, 2)], {type:"application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `gis_export_${Date.now()}.geojson`; a.click();
  });

  /* ---------- Go To Coordinates HUD ---------- */
  document.getElementById('goToCancel').addEventListener('click', ()=>{ goToCoordsHud.style.display='none'; });
  document.getElementById('goToExecute').addEventListener('click', ()=>{
    const lat = parseFloat(document.getElementById('goLat').value);
    const lng = parseFloat(document.getElementById('goLng').value);
    if(isNaN(lat) || isNaN(lng)) { alert('يرجى إدخال قيم رقمية صحيحة.'); return; }
    
    const targetLatLng = L.latLng(lat, lng);
    map.setView(targetLatLng, 18, { animate: true });
    
    if(targetLocationMarker) { map.removeLayer(targetLocationMarker); }
    targetLocationMarker = L.marker(targetLatLng).addTo(map)
      .bindPopup(`<div style="text-align:center;"><b>الموقع المستهدف</b><br>Lat: ${lat}<br>Lng: ${lng}<br><button onclick="window.removeTargetMarker()" style="margin-top:6px; background:var(--danger); color:#fff; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">حذف العلامة</button></div>`)
      .openPopup();
    goToCoordsHud.style.display = 'none';
  });

  window.removeTargetMarker = function() {
    if(targetLocationMarker) { map.removeLayer(targetLocationMarker); targetLocationMarker = null; }
  };

  document.getElementById('circleCancel').addEventListener('click', ()=>{ circleHud.style.display='none'; circlePending=null; });
  document.getElementById('circleCreate').addEventListener('click', ()=>{
    if(!circlePending)return;
    pushStateToUndo();
    const rad = Math.max(0.01, parseFloat(document.getElementById('cRadius').value)||10);
    const f = addFeature('circle', []);
    f.circle = { lat:circlePending.lat, lng:circlePending.lng, radius:rad };
    syncCircleCoords(f);
    
    circleHud.style.display='none'; circlePending=null;
    selection = {layerId:activeLayer().id, featureId:f.id};
    renderFeatures(); renderAttrPanel(); scheduleSave(); updateHistoryButtons();
    if(window.innerWidth <= 760) openMobileEditPad(f);
  });

  /* ---------- Map Utilities & Location Found ---------- */
  delete L.Icon.Default.prototype._getIconUrl;
  L.Icon.Default.mergeOptions({
    iconRetinaUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon-2x.png',
    iconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png'
  });

  let currentLocationMarker = null;
  document.getElementById('locateBtn').addEventListener('click', ()=>{
    document.getElementById('stHint').textContent = '⏳ جاري تحديد موقعك الحالي...';
    map.locate({setView:true, maxZoom:18});
  });
  
  map.on('locationerror', ()=>(document.getElementById('stHint').textContent = '❌ تعذر تحديد موقعك الحالي'));
  map.on('locationfound', (e)=>{
    document.getElementById('stHint').textContent = '📍 تم تحديد موقعك الحالي بنجاح';
    if(currentLocationMarker) { map.removeLayer(currentLocationMarker); }
    currentLocationMarker = L.circleMarker(e.latlng, {radius:9, color:'#fff', weight:2, fillColor:'#5ec9c0', fillOpacity:0.9}).addTo(map)
      .bindPopup('<b>موقعك الحالي الذكي</b>').openPopup();
  });

  /* ---------- Google Drive Synchronization Cloud Sync Engine ---------- */
  const DRIVE_CLIENT_ID = '331895697666-jrtnvsf748gndb0g4d7o6l78rur44shs.apps.googleusercontent.com';
  const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
  let driveToken = null, driveTokenExpiry = 0, tokenClient = null, driveConnected = false, lastPushTime = 0;

  const driveControlEl = document.getElementById('driveControl');
  const driveMsgEl = document.getElementById('driveMsg');
  const driveUpdateBanner = document.getElementById('driveUpdateBanner');
  const driveDismissBtn = document.getElementById('driveDismissBtn');
  let pendingRemote = null;

  function setDriveMsg(text, connected){
    driveMsgEl.textContent = text;
    driveControlEl.classList.toggle('connected', !!connected);
    driveControlEl.classList.toggle('disconnected', !connected);
  }

  function initDriveClient(){
    if(!window.google || !google.accounts || !google.accounts.oauth2){ setTimeout(initDriveClient, 400); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID, scope: DRIVE_SCOPE,
      callback: (resp)=>{
        if(resp.error){ setDriveMsg('فشل تسجيل الدخول', false); return; }
        driveToken = resp.access_token; driveTokenExpiry = Date.now() + (resp.expires_in*1000) - 60000;
        driveConnected = true; setDriveMsg('متصل — جاري الحفظ الأول...', true); pushToDrive();
      }
    });
  }
  initDriveClient();

  function ensureDriveToken(){
    return new Promise((resolve, reject)=>{
      if(driveToken && Date.now() < driveTokenExpiry){ resolve(driveToken); return; }
      if(!tokenClient){ reject('not-init'); return; }
      const orig = tokenClient.callback;
      tokenClient.callback = (resp)=>{
        tokenClient.callback = orig;
        if(resp.error){ driveConnected=false; setDriveMsg('انتهت الجلسة — اضغط اتصال', false); reject(resp.error); return; }
        driveToken=resp.access_token; driveTokenExpiry=Date.now()+(resp.expires_in*1000)-60000; resolve(driveToken);
      };
      tokenClient.requestAccessToken({prompt:''});
    });
  }

  function buildMultipart(boundary, metadata, content){
    const delim='\r\n--'+boundary+'\r\n', closeDelim='\r\n--'+boundary+'--';
    return delim+'Content-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+ delim+'Content-Type: application/geo+json\r\n\r\n'+content+closeDelim;
  }

  let drivePushInFlight=false;
  async function pushToDrive(){
    if(!driveConnected || drivePushInFlight) return;
    try{ await ensureDriveToken(); }catch(e){ return; }
    drivePushInFlight=true; setDriveMsg('⏳ مزامنة السحاب...', true);
    
    const geojson = { type: "FeatureCollection", features: [] };
    state.layers.forEach(layer => {
      layer.features.forEach(f => {
        let geomType = f.type==='point'?'Point':f.type==='line'?'LineString':'Polygon';
        let geomCoords = [];
        if(f.type==='point') geomCoords = [f.coords[0][1], f.coords[0][0]];
        else if(f.type==='line') geomCoords = f.coords.map(c=>[c[1], c[0]]);
        else geomCoords = [f.coords.concat([f.coords[0]]).map(c=>[c[1], c[0]])];
        
        const props = Object.assign({ layer: layer.name, type: f.type }, f.attrs);
        if(f.type==='rectangle') props.rect_info = f.rect;
        if(f.type==='circle') props.circle_info = f.circle;
        geojson.features.push({ type:"Feature", properties: props, geometry: { type: geomType, coordinates: geomCoords } });
      });
    });
    
    const content = JSON.stringify(geojson);
    try{
      if(!state.driveFileId){
        const boundary='foo_bar_baz';
        const metadata={ name:'gis_cloud_workspace.geojson', mimeType:'application/geo+json' };
        const body=buildMultipart(boundary, metadata, content);
        const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method:'POST', headers:{'Authorization':'Bearer '+driveToken, 'Content-Type':'multipart/related; boundary='+boundary}, body:body
        });
        const data=await res.json();
        if(data.id){ state.driveFileId=data.id; lastPushTime=Date.now(); setDriveMsg('☁️ متصل وسحابي نشط', true); scheduleSave(); }
      } else {
        const res=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+state.driveFileId+'?uploadType=media', {
          method:'PATCH', headers:{'Authorization':'Bearer '+driveToken, 'Content-Type':'application/geo+json'}, body:content
        });
        if(res.ok){ lastPushTime=Date.now(); setDriveMsg('☁️ متصل ومزامن', true); }
      }
    }catch(e){ console.error('push to drive failed', e); }
    drivePushInFlight=false;
  }

  function applyRemoteGeoJSON(geojson, remoteTime){
    pushStateToUndo();
    const byLayer={};
    geojson.features.forEach(feat=>{
      const props=feat.properties||{};
      const lName=props.layer||'طبقة مستوردة';
      if(!byLayer[lName]) byLayer[lName]=[];
      byLayer[lName].push(feat);
    });
    
    state.layers=[];
    Object.keys(byLayer).forEach((name, i)=>{
      const id='L'+uid()+i;
      const color=palette[i%palette.length];
      const features=byLayer[name].map(feat=>{
        const props = Object.assign({}, feat.properties);
        const rectInfo = props.rect_info, circleInfo = props.circle_info;
        delete props.layer; delete props.type; delete props.rect_info; delete props.circle_info;
        
        let coords, type = feat.properties.type;
        if(feat.geometry.type==='Point'){ type=type||'point'; coords=[[feat.geometry.coordinates[1], feat.geometry.coordinates[0]]]; }
        else if(feat.geometry.type==='LineString'){ type=type||'line'; coords=feat.geometry.coordinates.map(c=>[c[1],c[0]]); }
        else { coords=feat.geometry.coordinates[0].slice(0,-1).map(c=>[c[1],c[0]]); type=type||'polygon'; }
        
        const f={ id:uid(), type, coords, attrs:props };
        if(rectInfo) f.rect=rectInfo; if(circleInfo) f.circle=circleInfo;
        return f;
      });
      state.layers.push({id, name, color, visible:true, features});
    });
    
    if(state.layers.length===0) state.layers=[{id:'L1', name:'طبقة 1', color:palette[0], visible:true, features:[]}];
    state.activeLayerId=state.layers[0].id; state.lastPulledTime=remoteTime;
    
    selection=null; closeMobileEditPad(); renderLayerList(); renderFeatures(); renderAttrPanel(); scheduleSave();
  }

  document.getElementById('driveConnectBtn').addEventListener('click', ()=>{ if(tokenClient) tokenClient.requestAccessToken({prompt:'select_account'}); });
  document.getElementById('driveJoinBtn').addEventListener('click', ()=>{
    const fileId=prompt('أدخل رقم الملف (File ID) المشترك من زميلك للربط التزامني ومراقبته فورياً:');
    if(!fileId||!fileId.trim())return; pushStateToUndo(); state.driveFileId=fileId.trim();
    state.lastPulledTime=0; setDriveMsg('جاري جلب الملف المشترك...', true); pullFromDrive(true);
  });
  document.getElementById('driveCopyIdBtn').addEventListener('click', ()=>{
    if(!state.driveFileId){ alert('لا يوجد ملف سحابي حالياً، يرجى التوصيل أولاً.'); return; }
    navigator.clipboard.writeText(state.driveFileId); alert('تم نسخ ID الملف السحابي! أرسله لزملائك للعمل المشترك.');
  });
  document.getElementById('driveImportBtn').addEventListener('click', ()=>{
    if(pendingRemote){ applyRemoteGeoJSON(pendingRemote.geojson, pendingRemote.remoteTime); pendingRemote=null; driveUpdateBanner.style.display='none'; }
  });
  driveDismissBtn.addEventListener('click', ()=>{
    if(pendingRemote){ state.lastPulledTime=pendingRemote.remoteTime; pendingRemote=null; driveUpdateBanner.style.display='none'; }
  });

  async function pullFromDrive(force){
    if(!driveConnected || !state.driveFileId) return;
    try{ await ensureDriveToken(); }catch(e){ return; }
    try{
      const metaRes = await fetch('https://www.googleapis.com/drive/v3/files/'+state.driveFileId+'?fields=modifiedTime', {headers:{'Authorization':'Bearer '+driveToken}});
      const meta = await metaRes.json(); if(!meta.modifiedTime) return;
      const remoteTime = new Date(meta.modifiedTime).getTime();
      
      if(!force){
        if(remoteTime <= lastPushTime + 3000) return;
        if(remoteTime <= (state.lastPulledTime||0)) return;
      }
      
      const fileRes = await fetch('https://www.googleapis.com/drive/v3/files/'+state.driveFileId+'?alt=media', {headers:{'Authorization':'Bearer '+driveToken}});
      const geojson = await fileRes.json(); if(!geojson || !geojson.features) return;
      
      if(force){ applyRemoteGeoJSON(geojson, remoteTime); }
      else { pendingRemote = {geojson, remoteTime}; driveUpdateBanner.style.display='flex'; }
    }catch(e){ console.error('pull failed', e); }
  }

  setInterval(()=>{ if(driveConnected && state.driveFileId) pullFromDrive(false); }, 12000);
  const origScheduleSaveForDrive = scheduleSave;
  let drivePushTimer=null;
  scheduleSave = function(){
    origScheduleSaveForDrive();
    if(drivePushTimer) clearTimeout(drivePushTimer);
    if(driveConnected && state.driveFileId) drivePushTimer = setTimeout(pushToDrive, 2500);
  };

  loadState();
})();
</script>
</body>
</html>
