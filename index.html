<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>أداة الرسم المكانى المهنية - دقة الزوايا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght=400;500;700&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#0d2438;
    --bg-panel:#123152; --bg-panel-2:#0f2b47;
    --accent:#e8a33d; --accent-soft:rgba(232,163,61,.16);
    --teal:#5ec9c0; --teal-soft:rgba(94,201,192,.16);
    --text:#eef2f0; --text-muted:#84a0b6; --danger:#e2665b; --border:#1c4a73;
    --mono:'JetBrains Mono', ui-monospace, Consolas, monospace;
    --sans:'Inter', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;}
  .app{display:flex;flex-direction:row;height:100vh;height:100dvh;width:100vw;}
 
  .toolbar{width:72px;background:var(--bg-panel-2);border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:6px;flex-shrink:0;z-index:500;}
  .tool-btn{width:52px;height:52px;border-radius:10px;border:1px solid transparent;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text-muted);transition:.15s;}
  .tool-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;}
  .tool-btn span{font-size:9px;font-family:var(--sans);}
  .tool-btn:hover:not(:disabled){background:rgba(255,255,255,.05);color:var(--text);}
  .tool-btn.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
  .tool-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .toolbar-sep{width:36px;height:1px;background:var(--border);margin:4px 0;}
 
  .main{flex:1;position:relative;display:flex;flex-direction:column;min-width:0;}
  .canvas-wrap{flex:1;position:relative;overflow:hidden;}
  #map{width:100%;height:100%;background:#0d2438;}
  #map.tool-select{cursor:default;}
  #map.tool-draw{cursor:crosshair;}
 
  .basemap-toggle{position:absolute;top:10px;left:10px;z-index:450;background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;display:flex;padding:3px;gap:3px;box-shadow:0 4px 14px rgba(0,0,0,.35);}
  .basemap-toggle button{border:none;background:transparent;color:var(--text-muted);font-size:11.5px;padding:6px 10px;border-radius:6px;cursor:pointer;font-family:var(--sans);}
  .basemap-toggle button.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
 
  .drive-control{position:absolute;top:10px;right:10px;z-index:450;background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;padding:8px 12px;box-shadow:0 4px 14px rgba(0,0,0,.35);display:flex;align-items:center;gap:8px;font-size:11.5px;}
  .drive-control svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;flex-shrink:0;}
  .drive-control.connected{color:var(--teal);}
  .drive-control.disconnected{color:var(--text-muted);}
  .drive-control button{border:none;background:var(--accent);color:#1a1200;font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:var(--sans);}
  .drive-control .drive-msg{font-family:var(--mono);font-size:10.5px;opacity:.85;}
 
  .statusbar{height:30px;background:var(--bg-panel-2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:18px;font-family:var(--mono);font-size:11.5px;color:var(--text-muted);flex-shrink:0;}
  .statusbar b{color:var(--teal);font-weight:500;}
  .statusbar .spacer{flex:1;}
  .save-indicator{opacity:0;transition:opacity .3s;color:var(--teal);}
  .save-indicator.show{opacity:1;}
 
  .rect-hud{position:absolute;background:var(--bg-panel);border:1px solid var(--accent);border-radius:10px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:600;width:200px;display:none;}
  .rect-hud h4{margin:0 0 8px;font-size:12px;color:var(--accent);font-weight:600;}
  .rect-hud label{display:block;font-size:10.5px;color:var(--text-muted);margin-top:6px;}
  .rect-hud input, .rect-hud select{width:100%;background:var(--bg-panel-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 7px;font-family:var(--mono);font-size:12px;margin-top:2px;}
  .rect-hud .row-btns{display:flex;gap:6px;margin-top:10px;}
  .rect-hud .row-btns button{flex:1;border-radius:6px;border:none;padding:7px 0;font-size:11.5px;cursor:pointer;font-family:var(--sans);font-weight:600;}
  .btn-create{background:var(--accent);color:#1a1200;}
  .btn-cancel{background:var(--bg-panel-2);color:var(--text-muted);border:1px solid var(--border) !important;}
 
  .go-to-hud { width: 220px; border-color: var(--teal); }
 
  .sidebar{width:280px;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
  .tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
  .tab{flex:1;text-align:center;padding:11px 0;font-size:12.5px;color:var(--text-muted);cursor:pointer;font-weight:600;border-bottom:2px solid transparent;}
  .tab.active{color:var(--teal);border-bottom-color:var(--teal);}
  .panel{flex:1;overflow-y:auto;padding:12px;display:none;}
  .panel.active{display:block;}
 
  .section-title{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:4px 0 8px;font-weight:600;}
  .layer-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:var(--bg-panel-2);margin-bottom:6px;border:1px solid transparent;cursor:pointer;}
  .layer-row.active{border-color:var(--teal);}
  .swatch{width:16px;height:16px;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.2);cursor:pointer;}
  .layer-row .lname{flex:1;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .layer-row .lcount{font-size:10.5px;color:var(--text-muted);font-family:var(--mono);}
  .icon-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:3px;display:flex;}
  .icon-btn:hover{color:var(--text);}
  .add-btn{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;margin-top:4px;}
  .add-btn:hover{border-color:var(--teal);color:var(--teal);}
  .empty-state{color:var(--text-muted);font-size:12px;text-align:center;padding:40px 10px;line-height:1.7;}
  .attr-block{background:var(--bg-panel-2);border-radius:10px;padding:12px;margin-bottom:12px;}
  .attr-block .ftype{color:var(--accent);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .stat-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--text-muted);margin-top:6px;}
  .stat-row b{color:var(--text);font-weight:500;}
  .field-row{display:flex;gap:6px;margin-top:8px;align-items:center;}
  .field-row input{background:var(--bg-panel);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 7px;font-size:12px;font-family:var(--sans);flex:1;min-width:0;}
  
  .field-row input.key{flex:0 0 34%;color:var(--teal);font-family:var(--mono);font-size:11px;}
  .rect-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
  .rect-edit-grid label{font-size:10px;color:var(--text-muted);}
  .rect-edit-grid input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 7px;font-family:var(--mono);font-size:12px;margin-top:2px;}
  .danger-btn{width:100%;margin-top:10px;padding:8px;border-radius:8px;border:1px solid var(--danger);background:transparent;color:var(--danger);cursor:pointer;font-size:12px;font-weight:600;}
  .danger-btn:hover{background:rgba(226,102,91,.12);}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
 
  .leaflet-popup-content{font-family:var(--sans);direction:rtl;}
  .vertex-marker{background:var(--bg);border:2px solid var(--teal);border-radius:50%;cursor:move;}
  .vertex-ghost-marker{background:transparent;border:2px dashed rgba(94,201,192,0.6);border-radius:50%;cursor:pointer;}
  .rect-rotate-marker{background:#e8a33d;border:2px solid #0d2438;border-radius:50%;cursor:alias;}
  .rect-scale-marker{background:#5ec9c0;border:2px solid #0d2438;border-radius:50%;cursor:se-resize;}
 
  .mobile-sidebar-toggle{display:none;position:fixed;bottom:calc(76px + env(safe-area-inset-bottom, 0px) + 16px);left:12px;z-index:900;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#1a1200;border:none;box-shadow:0 6px 16px rgba(0,0,0,.4);align-items:center;justify-content:center;}
  .mobile-sidebar-toggle svg{width:22px;height:22px;}
 
  .mobile-finish-btn {
    display: none; position: absolute; bottom: 20px; right: 20px; z-index: 999;
    background: var(--teal); color: #0d2438; border: none; border-radius: 30px;
    padding: 12px 20px; font-weight: bold; font-size: 13px; font-family: var(--sans);
    box-shadow: 0 4px 15px rgba(0,0,0,0.4); align-items: center; gap: 6px;
  }
 
  .mobile-crosshair {
    display: none; position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
    transform: translate(-50%, -50%); z-index: 800; pointer-events: none;
  }
  .mobile-crosshair::before, .mobile-crosshair::after {
    content: ''; position: absolute; background: var(--accent);
  }
  .mobile-crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; }
  .mobile-crosshair::after { top: 0; left: 11px; width: 2px; height: 24px; }
 
  .mobile-edit-pad {
    display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-panel); border: 2px solid var(--accent); border-radius: 14px;
    padding: 8px; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    flex-direction: column; gap: 6px; width: 90%; max-width: 320px;
  }
  .mobile-pad-title { font-size: 11px; color: var(--accent); text-align: center; font-weight: bold; margin-bottom: 2px; }
  .mobile-pad-row { display: flex; gap: 6px; }
  .mobile-pad-btn {
    flex: 1; padding: 10px 4px; background: var(--bg-panel-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; font-size: 11.5px; font-weight: bold; cursor: pointer;
    font-family: var(--sans); display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .mobile-pad-btn.active { background: var(--teal-soft); border-color: var(--teal); color: var(--teal); }
  .mobile-pad-btn.action-btn { background: var(--accent); color: #1a1200; border: none; }
 
  @media (max-width: 760px){
    .app{flex-direction:column;}
    .toolbar{
      width:100%;height:calc(66px + env(safe-area-inset-bottom, 0px) + 16px);
      padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 16px);
      flex-direction:row;border-left:none;border-top:1px solid var(--border);
      order:3;overflow-x:auto;padding-right:6px;padding-left:6px;padding-top:6px;
      -webkit-overflow-scrolling:touch;justify-content:flex-start;box-sizing:border-box;
    }
    .toolbar-sep{width:1px;height:34px;margin:0 5px;flex-shrink:0;}
    .tool-btn{width:46px;height:46px;flex-shrink:0;}
    .tool-btn span{font-size:7.5px;}
    .main{order:1;min-height:0;}
    .sidebar{
      position:fixed;top:0;bottom:calc(66px + env(safe-area-inset-bottom, 0px) + 16px);right:0;width:88%;max-width:320px;z-index:850;
      transform:translateX(100%);transition:transform .25s ease;box-shadow:-8px 0 24px rgba(0,0,0,.45);
    }
    .sidebar.open{transform:translateX(0);}
    .mobile-sidebar-toggle{display:flex;}
    .basemap-toggle{top:8px;left:8px;padding:2px;}
    .basemap-toggle button{font-size:10px;padding:5px 7px;}
    .drive-control{top:8px;right:8px;padding:6px 8px;gap:5px;flex-wrap:wrap;max-width:44vw;}
    .drive-control .drive-msg{font-size:9px;}
    .drive-control button{font-size:9.5px;padding:4px 6px;}
    .rect-hud{left:50% !important;top:50% !important;transform:translate(-50%,-50%);width:82vw;max-width:260px;}
    .statusbar{font-size:10px;gap:10px;padding:0 8px;flex-wrap:wrap;height:auto;min-height:28px;}
  }
</style>
</head>
<body>
<div class="app">
 
  <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" title="الطبقات والخصائص">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
  </button>
 
  <div class="toolbar" id="toolbar">
    <button class="tool-btn active" data-tool="select" title="تحديد وتحرير">
      <svg viewBox="0 0 24 24"><path d="M4 3l7 17 2-7 7-2z"/></svg><span>تحديد</span>
    </button>
    <button class="tool-btn" data-tool="point" title="نقطة">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/></svg><span>نقطة</span>
    </button>
    <button class="tool-btn" data-tool="line" title="خط">
      <svg viewBox="0 0 24 24"><path d="M4 18L20 6"/><circle cx="4" cy="18" r="1.6" fill="currentColor"/><circle cx="20" cy="6" r="1.6" fill="currentColor"/></svg><span>خط</span>
    </button>
    <button class="tool-btn" data-tool="polygon" title="مضلع">
      <svg viewBox="0 0 24 24"><path d="M12 3l8 6-3 10H7L4 9z"/></svg><span>مضلع</span>
    </button>
    <button class="tool-btn" data-tool="rectangle" title="مستطيل بـ 3 نقاط">
      <svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="9"/><path d="M4 5.5h16M4 4v3M20 4v3"/></svg><span>مستطيل</span>
    </button>
    <button class="tool-btn" data-tool="circle" title="دائرة بنصف قطر">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 12h8"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg><span>دائرة</span>
    </button>
    
    <div class="toolbar-sep"></div>
 
    <button class="tool-btn" id="goToCoordsBtn" title="انتقال إلى إحداثيات">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20M12 7a5 5 0 100 10 5 5 0 000-10z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg><span>إحداثي</span>
    </button>
    
    <div class="toolbar-sep"></div>
    
    <button class="tool-btn" id="undoBtn" title="تراجع (Ctrl+Z)" disabled>
      <svg viewBox="0 0 24 24"><path d="M3 7v6h6M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg><span>تراجع</span>
    </button>
    <button class="tool-btn" id="redoBtn" title="إعادة (Ctrl+Y)" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 7v6h-6M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/></svg><span>إعادة</span>
    </button>
 
    <div class="toolbar-sep"></div>
    <button class="tool-btn active" id="snapBtn" title="تفعيل/تعطيل السناب">
      <svg viewBox="0 0 24 24"><path d="M4 12h4M16 12h4M12 4v4M12 16v4"/><circle cx="12" cy="12" r="3"/></svg><span>سناب</span>
    </button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn" id="locateBtn" title="تحديد موقعي الحالي">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg><span>موقعي</span>
    </button>
    <button class="tool-btn" id="fitBtn" title="ملائمة العرض">
      <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg><span>ملائمة</span>
    </button>
    <div class="toolbar-sep"></div>
    <button class="tool-btn" id="exportBtn" title="حفظ كملف محلي">
      <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 19h14"/></svg><span>تصدير</span>
    </button>
  </div>
 
  <div class="main">
    <div class="canvas-wrap">
      <div id="map"></div>
      
      <div class="mobile-crosshair" id="mobileCrosshair"></div>
 
      <div class="mobile-edit-pad" id="mobileEditPad">
        <div class="mobile-pad-title" id="mobilePadTitle">تعديل العنصر عبر تحريك الخريطة</div>
        <div class="mobile-pad-row" id="mobileVertexRow" style="display:none;">
          <button class="mobile-pad-btn" id="btnPrevVertex">⏮ السابق</button>
          <button class="mobile-pad-btn" id="btnNextVertex">التالي ⏭</button>
        </div>
        <div class="mobile-pad-row">
          <button class="mobile-pad-btn active" id="btnPadMove">✋ نقل الكل</button>
          <button class="mobile-pad-btn" id="btnPadVertex" style="display:none;">📍 تعديل النقطة</button>
          <button class="mobile-pad-btn" id="btnPadDeleteVertex" style="display:none; background:rgba(226,102,91,0.2); color:var(--danger);">❌ حذف نقطة</button>
          <button class="mobile-pad-btn" id="btnPadAddVertex" style="display:none; background:rgba(94,201,192,0.18); color:var(--teal);">➕ إضافة نقطة</button>
          <button class="mobile-pad-btn" id="btnPadRotate" style="display:none;">🔄 تدوير</button>
          <button class="mobile-pad-btn" id="btnPadScale" style="display:none;">📐 سكيل</button>
        </div>
        <div class="mobile-pad-row">
          <button class="mobile-pad-btn action-btn" id="btnPadApply">تطبيق التغيير هنا</button>
          <button class="mobile-pad-btn" id="btnPadCancel" style="background:var(--danger); color:var(--text); border:none;">إغلاق</button>
        </div>
      </div>
 
      <button class="mobile-finish-btn" id="mobileFinishBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align: middle;"><polyline points="20 6 9 17 4 12"></polyline></svg>
        إنهـاء الرسم
      </button>
 
      <div class="basemap-toggle">
        <button id="btnSat" class="active">قمر صناعي</button>
        <button id="btnStreets">خريطة عادية</button>
      </div>
      <div class="drive-control disconnected" id="driveControl">
        <svg viewBox="0 0 24 24"><path d="M7 15l-4-7 4-7h10l4 7-4 7z"/><path d="M3 8h18M9 15l3 5 3-5"/></svg>
        <span class="drive-msg" id="driveMsg">غير متصل بـ Drive</span>
        <button id="driveConnectBtn">اتصال</button>
        <button id="driveJoinBtn" title="ربط بملف صديقك لعرضه على خريطتك (للقراءة فقط)">ربط بصديق</button>
        <button id="driveCopyIdBtn" title="نسخ رقم الملف لمشاركته">نسخ ID</button>
      </div>
      <div class="drive-control" id="driveUpdateBanner" style="display:none;top:56px;border-color:var(--accent);">
        <span class="drive-msg" style="color:var(--accent);">🔄 فيه نسخة تانية على Drive</span>
        <button id="driveImportBtn">استيراد</button>
        <button id="driveDismissBtn" style="background:var(--bg-panel-2);color:var(--text-muted);">تجاهل</button>
      </div>
      
      <div class="rect-hud" id="rectHud">
        <h4>تأكيد أبعاد المستطيل</h4>
        <label>العرض المحسوب (متر)</label>
        <input type="number" id="rWidth" value="10" step="0.1" min="0.01">
        <label>الطول المحسوب (متر)</label>
        <input type="number" id="rLength" value="20" step="0.1" min="0.01">
        <label>زاوية الدوران المحسوبة (°)</label>
        <input type="number" id="rRotation" value="0" step="1">
        <label>نقطة الإدراج تمثل</label>
        <select id="rAnchor"><option value="corner">ركن المستطيل</option><option value="center">مركز المستطيل</option></select>
        <div class="row-btns">
          <button class="btn-cancel" id="rectCancel">إلغاء</button>
          <button class="btn-create" id="rectCreate">إنشاء</button>
        </div>
      </div>
 
      <div class="rect-hud go-to-hud" id="goToCoordsHud">
        <h4 style="color:var(--teal);">الانتقال لنقطة إحداثية</h4>
        <label>خط العرض (Latitude)</label>
        <input type="number" id="goLat" value="29.9792" step="0.000001">
        <label>خط الطول (Longitude)</label>
        <input type="number" id="goLng" value="31.1342" step="0.000001">
        <div class="row-btns">
          <button class="btn-cancel" id="goToCancel">إلغاء</button>
          <button class="btn-create" id="goToExecute" style="background:var(--teal);">انتقال</button>
        </div>
      </div>
      
      <div class="rect-hud" id="circleHud">
        <h4>دائرة بنصف قطر</h4>
        <label>نصف القطر (متر)</label>
        <input type="number" id="cRadius" value="10" step="0.1" min="0.01">
        <div class="row-btns">
          <button class="btn-cancel" id="circleCancel">إلغاء</button>
          <button class="btn-create" id="circleCreate">إنشاء</button>

      <span>Lat: <b id="stLat">--</b></span>
      <span>Lng: <b id="stLng">--</b></span>

      <span class="save-indicator" id="saveIndicator">✓ تم الحفظ محلياً</span>
      <div class="spacer"></div>
      <span id="stHint">اختر أداة رسم من الشريط الجانبي</span>
    </div>
  </div>
 
  <div class="sidebar">
    <div class="tabs">
      <div class="tab active" data-panel="layersPanel">الطبقات</div>
      <div class="tab" data-panel="attrPanel">الخصائص</div>

      <div class="section-title">الطبقات</div>
      <div id="layerList"></div>
      <button class="add-btn" id="addLayerBtn">+ طبقة جديدة</button>
    </div>
    <div class="panel" id="attrPanel">
      <div id="attrContent"><div class="empty-state">اختر عنصر من الخريطة<br>لعرض وتعديل خصائصه</div></div>
    </div>
  </div>
 
</div>
 
<script>
(function(){
  "use strict";
  const palette = ['#e8a33d','#5ec9c0','#e2665b','#8fbf5e','#c47fd6','#4f9ddb','#d6a15e','#7fd6b0'];
  let state = {
    layers: [{id:'L1', name:'طبقة 1', color: palette[0], visible:true, features:[]}],
    activeLayerId:'L1', nextColorIdx:1,
    friendFileIds: [], friendLastPulled: {}   // friendLastPulled: {fileId: timestamp}
  };
  let friendLayers = [];      // read-only layers pulled from friends' Drive files (each layer carries .fid = owning friend's File ID)
  let friendLayerGroups = {}; // separate Leaflet layer groups for friend data, keyed by fid+'__'+layer.id
  let tool = 'select';
  let selection = null;
  let drawingCoords = null;
  
  let rect3Point = { pt1: null, pt2: null, pt3: null, step: 0 }; 
  let circlePending = null;
  let dragCtx = null;
  let saveTimer = null;
  let tempLine = null;
  let snapEnabled = true;
  let snapMarker = null;
  let targetLocationMarker = null;
 
  let mobileMode = 'move'; 
  let mobileActiveVertexIdx = 0;
  let isMobileEnv = false;
 
  let undoStack = [];
  let redoStack = [];
 
  const mapEl = document.getElementById('map');
  const rectHud = document.getElementById('rectHud');
  const goToCoordsHud = document.getElementById('goToCoordsHud');
  const circleHud = document.getElementById('circleHud');
  const mobileFinishBtn = document.getElementById('mobileFinishBtn');
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
 
  const mobileCrosshair = document.getElementById('mobileCrosshair');
  const mobileEditPad = document.getElementById('mobileEditPad');
  const mobileVertexRow = document.getElementById('mobileVertexRow');
  const mobilePadTitle = document.getElementById('mobilePadTitle');
  const btnPadMove = document.getElementById('btnPadMove');
  const btnPadVertex = document.getElementById('btnPadVertex');
  const btnPadDeleteVertex = document.getElementById('btnPadDeleteVertex');
  const btnPadAddVertex = document.getElementById('btnPadAddVertex');
  const btnPadRotate = document.getElementById('btnPadRotate');
  const btnPadScale = document.getElementById('btnPadScale');
 
  const map = L.map('map', {zoomControl:false, center:[29.9792, 31.1342], zoom:16, worldCopyJump:true});
  L.control.zoom({position:'topleft'}).addTo(map);
 
  const satLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    attribution: '© Google Maps', maxZoom: 20
  });
  const streetsLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom:22, subdomains:'abc'
  });
  satLayer.addTo(map);
 
  document.getElementById('btnSat').addEventListener('click', ()=>{
    map.removeLayer(streetsLayer); map.addLayer(satLayer);
    document.getElementById('btnSat').classList.add('active');
    document.getElementById('btnStreets').classList.remove('active');
  });
  document.getElementById('btnStreets').addEventListener('click', ()=>{
    map.removeLayer(satLayer); map.addLayer(streetsLayer);
    document.getElementById('btnStreets').classList.add('active');
    document.getElementById('btnSat').classList.remove('active');
  });
 
  const layerGroups = {}; 
  function ensureLayerGroup(layer){
    if(!layerGroups[layer.id]){
      layerGroups[layer.id] = L.layerGroup();
      if(layer.visible) layerGroups[layer.id].addTo(map);
    }
    return layerGroups[layer.id];
  }
 
  /* ---------- History Management ---------- */
  function pushStateToUndo() {
    undoStack.push(JSON.stringify({ layers: state.layers, activeLayerId: state.activeLayerId, nextColorIdx: state.nextColorIdx }));
    redoStack = []; 
    updateHistoryButtons();
  }
 
  function updateHistoryButtons() {
    undoBtn.disabled = (undoStack.length === 0) && (!drawingCoords || drawingCoords.length === 0) && (rect3Point.step === 0);
    redoBtn.disabled = (redoStack.length === 0);
  }
 
  function handleUndo() {
    if (tool === 'rectangle' && rect3Point.step > 0) {
      rect3Point.step--;
      if(rect3Point.step === 0) {
        rect3Point.pt1 = null; rect3Point.pt2 = null; drawingCoords = null;
        document.getElementById('stHint').textContent = 'انقر لوضع النقطة الأولى للمستطيل...';
      } else if(rect3Point.step === 1) {
        rect3Point.pt2 = null;
        drawingCoords = [[rect3Point.pt1.lat, rect3Point.pt1.lng]];
        document.getElementById('stHint').textContent = 'انقر لوضع النقطة الثانية (لتحديد خط الاتجاه والزاوية)...';
      }
      if (tempLine) { map.removeLayer(tempLine); tempLine = null; }
      document.getElementById('stTemp').textContent = '';
      updateHistoryButtons();
      return;
    }
 
    if (drawingCoords && drawingCoords.length > 0) {
      drawingCoords.pop();
      if (drawingCoords.length === 0) {
        drawingCoords = null;
        mobileFinishBtn.style.display = 'none';
        if (tempLine) { map.removeLayer(tempLine); tempLine = null; }
        document.getElementById('stTemp').textContent = '';
      } else {
        if (tempLine) { map.removeLayer(tempLine); }
        tempLine = L.polyline(drawingCoords, {color:'#e8a33d', weight:2, dashArray:'6 5'}).addTo(map);
      }
      updateHistoryButtons();
      return;
    }
 
    if (undoStack.length > 0) {
      const currentState = JSON.stringify({ layers: state.layers, activeLayerId: state.activeLayerId, nextColorIdx: state.nextColorIdx });
      redoStack.push(currentState);
      
      const previous = JSON.parse(undoStack.pop());
      state.layers = previous.layers;
      state.activeLayerId = previous.activeLayerId;
      state.nextColorIdx = previous.nextColorIdx;
      
      selection = null;
      closeMobileEditPad();
      renderLayerList();
      renderFeatures();
      renderAttrPanel();
      updateHistoryButtons();
      scheduleSave();
    }
  }
 
  function handleRedo() {
    if (redoStack.length > 0) {
      const currentState = JSON.stringify({ layers: state.layers, activeLayerId: state.activeLayerId, nextColorIdx: state.nextColorIdx });
      undoStack.push(currentState);
      
      const next = JSON.parse(redoStack.pop());
      state.layers = next.layers;
      state.activeLayerId = next.activeLayerId;
      state.nextColorIdx = next.nextColorIdx;
      
      selection = null;
      closeMobileEditPad();
      renderLayerList();
      renderFeatures();
      renderAttrPanel();
      updateHistoryButtons();
      scheduleSave();
    }
  }
 
  undoBtn.addEventListener('click', (e) => { L.DomEvent.stopPropagation(e); handleUndo(); });
  redoBtn.addEventListener('click', (e) => { L.DomEvent.stopPropagation(e); handleRedo(); });
 
  /* ---------- Geometry helpers ---------- */
  function uid(){ return 'f' + Math.random().toString(36).slice(2,10); }
  function toRad(d){ return d*Math.PI/180; }
  function toDeg(r){ return r*180/Math.PI; }
  
  function haversine(lat1,lng1,lat2,lng2){
    const R=6371000;
    const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
    const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }
  
  function destPoint(lat,lng,dEast,dNorth){
    const dLat = dNorth/111320;
    const dLng = dEast/(111320*Math.cos(toRad(lat)));
    return [lat+dLat, lng+dLng];
  }
 
  function projectPointOnLine(pt, lineStart, lineEnd) {
    const x = pt.lng, y = pt.lat;
    const x1 = lineStart.lng, y1 = lineStart.lat;
    const x2 = lineEnd.lng, y2 = lineEnd.lat;
    const A = x - x1, B = y - y1, C = x2 - x1, D = y2 - y1;
    const dot = A * C + B * D;
    const lenSq = C * C + D * D;
    let param = -1;
    if (lenSq !== 0) param = dot / lenSq;
    const projLng = x1 + param * C;
    const projLat = y1 + param * D;
    const dist = haversine(y, x, projLat, projLng);
    return { latlng: L.latLng(projLat, projLng), distance: dist };
  }
  
  function pathLength(coords){
    let s=0; for(let i=0;i<coords.length-1;i++) s+=haversine(coords[i][0],coords[i][1],coords[i+1][0],coords[i+1][1]);
    return s;
  }
  function pathPerimeter(coords){ return pathLength(coords) + haversine(coords[coords.length-1][0],coords[coords.length-1][1],coords[0][0],coords[0][1]); }
  
  function polygonAreaMeters(coords){
    const refLat = coords[0][0], refLng = coords[0][1];
    const pts = coords.map(c=>{
      const north = (c[0]-refLat)*111320;
      const east = (c[1]-refLng)*111320*Math.cos(toRad(refLat));
      return [east, north];
    });
    let a=0;
    for(let i=0;i<pts.length;i++){ const [x1,y1]=pts[i], [x2,y2]=pts[(i+1)%pts.length]; a+=x1*y2-x2*y1; }
    return Math.abs(a)/2;
  }
  
  function rectCorners(rect){
    const th = toRad(rect.rotation);
    const uxE = Math.cos(th), uxN = Math.sin(th);
    const uyE = -Math.sin(th), uyN = Math.cos(th);
    let baseE=0, baseN=0;
    if(rect.mode==='center'){ 
      baseE = -(uxE*rect.width/2+uyE*rect.length/2); 
      baseN = -(uxN*rect.width/2+uyN*rect.length/2);
    }
    const cornersMeters = [
      [baseE, baseN],
      [baseE+uxE*rect.width, baseN+uxN*rect.width],
      [baseE+uxE*rect.width+uyE*rect.length, baseN+uxN*rect.width+uyN*rect.length],
      [baseE+uyE*rect.length, baseN+uyN*rect.length]
    ];
    return cornersMeters.map(([e,n])=>destPoint(rect.lat, rect.lng, e, n));
  }
  
  function syncRectCoords(f){ f.coords = rectCorners(f.rect); }
  
  function circlePoints(circle, segments){
    segments = segments || 64;
    const pts = [];
    for(let i=0;i<segments;i++){
      const ang = (i/segments)*Math.PI*2;
      const east = circle.radius*Math.sin(ang);
      const north = circle.radius*Math.cos(ang);
      pts.push(destPoint(circle.lat, circle.lng, east, north));
    }
    return pts;
  }
  function syncCircleCoords(f){ f.coords = circlePoints(f.circle); }
 
  function getLayer(id){ return state.layers.find(l=>l.id===id); }
  function getFeature(layerId, featureId){ const l=getLayer(layerId); return l? l.features.find(f=>f.id===featureId): null; }
  function activeLayer(){ return getLayer(state.activeLayerId) || state.layers[0]; }
 
  function findSnap(latlng, excludeFeatureId){
    if(!snapEnabled) return null;
    const pt = map.latLngToContainerPoint(latlng);
    let best=null, bestDist=12;
    state.layers.forEach(layer=>{
      if(!layer.visible) return;
      layer.features.forEach(f=>{
        if(f.id===excludeFeatureId) return;
        f.coords.forEach(c=>{
          const cp = map.latLngToContainerPoint(L.latLng(c[0],c[1]));
          const d = Math.hypot(cp.x-pt.x, cp.y-pt.y);
          if(d<bestDist){ bestDist=d; best=c; }
        });
      });
    });
    return best;
  }
  
  function effectiveLatLng(e, excludeFeatureId){
    const snap = findSnap(e.latlng, excludeFeatureId);
    if(snap){
      if(!snapMarker) snapMarker = L.circleMarker(snap, {radius:9, color:'#e8a33d', weight:2, fillOpacity:0}).addTo(map);
      else snapMarker.setLatLng(snap);
      return L.latLng(snap[0], snap[1]);
    } else if(snapMarker){
      map.removeLayer(snapMarker); snapMarker=null;
    }
    return e.latlng;
  }
 
  /* ---------- Delete / Remove Vertex Logic ---------- */
  function removeVertexAtIndex(f, idx) {
    if(f.type === 'rectangle' || f.type === 'circle') {
      alert('لا يمكن تعديل نقاط الأركان للمستطيلات أو الدوائر الهندسية الجاهزة، يمكنك استخدام سكيل أو تعديل الأبعاد رقمياً.');
      return;
    }
    const minPoints = f.type === 'polygon' ? 3 : 2;
    if (f.coords.length <= minPoints) {
      alert(`الـ ${f.type === 'polygon'?'مضلع':'خط'} لا يمكن أن يحتوي على أقل من ${minPoints} نقاط! يمكنك حذف العنصر كاملاً إذا أردت.`);
      return;
    }
    pushStateToUndo();
    f.coords.splice(idx, 1);
    renderFeatures();
    renderAttrPanel();
    scheduleSave();
  }
 
  /* ---------- Persistence ---------- */
  function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(doSave, 700); }
  function doSave(){
    try{
      localStorage.setItem('gis-tool-state-v2', JSON.stringify({state}));
      const ind=document.getElementById('saveIndicator'); ind.classList.add('show');
      setTimeout(()=>ind.classList.remove('show'),1200);
    }catch(e){ console.error('save failed', e); }
  }
  function loadState(){
    try{
      const raw = localStorage.getItem('gis-tool-state-v2');
      if(raw){ const parsed = JSON.parse(raw); if(parsed.state && parsed.state.layers) state=parsed.state; }
    }catch(e){}
    if(!Array.isArray(state.friendFileIds)) state.friendFileIds = state.friendFileId ? [state.friendFileId] : [];
    if(!state.friendLastPulled) state.friendLastPulled = {};
    renderLayerList(); renderFeatures();
    const all=[]; state.layers.forEach(l=>l.features.forEach(f=>f.coords.forEach(c=>all.push(c))));
    if(all.length) map.fitBounds(L.latLngBounds(all), {padding:[40,40]});
  }
 
  /* ---------- Mobile Control Pad ---------- */
  function openMobileEditPad(f) {
    isMobileEnv = window.innerWidth <= 760;
    if(!isMobileEnv) return;
 
    mobileCrosshair.style.display = 'block';
    mobileEditPad.style.display = 'flex';
    
    btnPadVertex.style.display = (f.type !== 'rectangle' && f.type !== 'circle') ? 'block' : 'none';
    btnPadDeleteVertex.style.display = (f.type !== 'rectangle' && f.type !== 'circle') ? 'block' : 'none';
    btnPadAddVertex.style.display = (f.type === 'polygon') ? 'block' : 'none';
    btnPadRotate.style.display = (f.type === 'rectangle') ? 'block' : 'none';
    btnPadScale.style.display = (f.type === 'rectangle') ? 'block' : 'none';
 
    setMobileEditMode('move');
  }
 
  function closeMobileEditPad() {
    mobileCrosshair.style.display = 'none';
    mobileEditPad.style.display = 'none';
    mobileVertexRow.style.display = 'none';
    if(snapMarker) { map.removeLayer(snapMarker); snapMarker = null; }
  }
 
  function setMobileEditMode(mode) {
    mobileMode = mode;
    document.querySelectorAll('.mobile-pad-btn[id^="btnPad"]').forEach(b => b.classList.remove('active'));
    
    const f = getFeature(selection.layerId, selection.featureId);
    if(!f) return;
 
    if(mode === 'move') {
      btnPadMove.classList.add('active');
      mobilePadTitle.textContent = "⚙️ اسحب الخريطة لنقل العنصر بالكامل";
      mobileVertexRow.style.display = 'none';
    } 
    else if(mode === 'vertex') {
      btnPadVertex.classList.add('active');
      mobileVertexRow.style.display = 'flex';
      mobileActiveVertexIdx = 0;
      focusOnMobileVertex(f);
    }
    else if(mode === 'rotate') {
      btnPadRotate.classList.add('active');
      mobilePadTitle.textContent = "🔄 حرك الخريطة لتدوير المستطيل حول مركزه";
      mobileVertexRow.style.display = 'none';
    }
    else if(mode === 'scale') {
      btnPadScale.classList.add('active');
      mobilePadTitle.textContent = "📐 حرك الخريطة لتغيير حجم وأبعاد المستطيل";
      mobileVertexRow.style.display = 'none';
    }
  }
 
  function focusOnMobileVertex(f) {
    if(!f.coords[mobileActiveVertexIdx]) return;
    const c = f.coords[mobileActiveVertexIdx];
    mobilePadTitle.textContent = `📍 تعديل النقطة رقم (${mobileActiveVertexIdx + 1} من ${f.coords.length})`;
    map.setView(c, map.getZoom(), {animate: true});
  }
 
  btnPadMove.addEventListener('click', () => setMobileEditMode('move'));
  if(btnPadVertex) btnPadVertex.addEventListener('click', () => setMobileEditMode('vertex'));
  if(btnPadRotate) btnPadRotate.addEventListener('click', () => setMobileEditMode('rotate'));
  if(btnPadScale) btnPadScale.addEventListener('click', () => setMobileEditMode('scale'));
  
  btnPadDeleteVertex.addEventListener('click', () => {
    const f = getFeature(selection.layerId, selection.featureId);
    if(!f) return;
    removeVertexAtIndex(f, mobileActiveVertexIdx);
    mobileActiveVertexIdx = Math.max(0, mobileActiveVertexIdx - 1);
    if(f.coords[mobileActiveVertexIdx]) focusOnMobileVertex(f);
    else { setMobileEditMode('move'); }
  });
 
  btnPadAddVertex.addEventListener('click', () => {
    const f = getFeature(selection.layerId, selection.featureId);
    if(!f || f.type !== 'polygon') return;
    pushStateToUndo();
    // Insert midpoint between current vertex and the next one (wrapping around)
    const cur = f.coords[mobileActiveVertexIdx];
    const nextIdx = (mobileActiveVertexIdx + 1) % f.coords.length;
    const nxt = f.coords[nextIdx];
    const midLat = (cur[0] + nxt[0]) / 2;
    const midLng = (cur[1] + nxt[1]) / 2;
    f.coords.splice(mobileActiveVertexIdx + 1, 0, [midLat, midLng]);
    mobileActiveVertexIdx = mobileActiveVertexIdx + 1;
    renderFeatures();
    renderAttrPanel();
    scheduleSave();
    const insertedIdx = mobileActiveVertexIdx;
    setMobileEditMode('vertex');          // may reset mobileActiveVertexIdx to 0
    mobileActiveVertexIdx = insertedIdx;  // restore to the newly inserted vertex
    focusOnMobileVertex(f);
  });
 
  document.getElementById('btnNextVertex').addEventListener('click', () => {
    const f = getFeature(selection.layerId, selection.featureId);
    if(!f) return;
    mobileActiveVertexIdx = (mobileActiveVertexIdx + 1) % f.coords.length;
    focusOnMobileVertex(f);
  });
  document.getElementById('btnPrevVertex').addEventListener('click', () => {
    const f = getFeature(selection.layerId, selection.featureId);
    if(!f) return;
    mobileActiveVertexIdx = (mobileActiveVertexIdx - 1 + f.coords.length) % f.coords.length;
    focusOnMobileVertex(f);
  });
 
  document.getElementById('btnPadCancel').addEventListener('click', () => {
    selection = null; closeMobileEditPad(); renderFeatures(); renderAttrPanel();
  });
 
  document.getElementById('btnPadApply').addEventListener('click', () => {
    const f = getFeature(selection.layerId, selection.featureId);
    if(!f) return;
 
    pushStateToUndo();
    const centerLatLng = map.getCenter();
 
    if(mobileMode === 'move') {
      let oldCenterLat = 0, oldCenterLng = 0;
      if(f.type === 'rectangle' || f.type === 'circle') {
        oldCenterLat = f[f.type].lat; oldCenterLng = f[f.type].lng;
      } else {
        f.coords.forEach(c => { oldCenterLat += c[0]; oldCenterLng += c[1]; });
        oldCenterLat /= f.coords.length; oldCenterLng /= f.coords.length;
      }
      const dLat = centerLatLng.lat - oldCenterLat;
      const dLng = centerLatLng.lng - oldCenterLng;
 
      if(f.type === 'rectangle' || f.type === 'circle') {
        f[f.type].lat = centerLatLng.lat; f[f.type].lng = centerLatLng.lng;
        f.type === 'rectangle' ? syncRectCoords(f) : syncCircleCoords(f);
      } else {
        f.coords = f.coords.map(c => [c[0] + dLat, c[1] + dLng]);
      }
    } 
    else if(mobileMode === 'vertex') {
      f.coords[mobileActiveVertexIdx] = [centerLatLng.lat, centerLatLng.lng];
    }
    else if(mobileMode === 'rotate') {
      const corners = f.coords;
      const cLat = (corners[0][0] + corners[2][0]) / 2;
      const cLng = (corners[0][1] + corners[2][1]) / 2;
      const angle = Math.atan2(centerLatLng.lat - cLat, centerLatLng.lng - cLng);
      f.rect.rotation = Math.round(toDeg(angle) % 360);
      syncRectCoords(f);
    }
    else if(mobileMode === 'scale') {
      const anchor = f.coords[0];
      const w = haversine(anchor[0], anchor[1], anchor[0], centerLatLng.lng);
      const l = haversine(anchor[0], anchor[1], centerLatLng.lat, anchor[1]);
      f.rect.width = Math.max(1, parseFloat(w.toFixed(1)));
      f.rect.length = Math.max(1, parseFloat(l.toFixed(1)));
      syncRectCoords(f);
    }
 
    renderFeatures();
    renderAttrPanel();
    scheduleSave();
    
    if(mobileMode === 'vertex') focusOnMobileVertex(f);
    else mobilePadTitle.textContent = "✅ تم تطبيق التعديل بنجاح!";
  });
 
  /* ---------- Rendering vector features ---------- */
  function renderFeatures(){
    state.layers.forEach(layer=>{
      const lg = ensureLayerGroup(layer);
      lg.clearLayers();
      if(layer.visible){ if(!map.hasLayer(lg)) lg.addTo(map); } else { if(map.hasLayer(lg)) map.removeLayer(lg); }
      layer.features.forEach(f=>{
        const isSel = selection && selection.layerId===layer.id && selection.featureId===f.id;
        const color = layer.color;
        let shape;
        if(f.type==='point'){
          shape = L.circleMarker(f.coords[0], {radius:7, color: isSel?'#5ec9c0':'#0d2438', weight:isSel?2.5:1.4, fillColor:color, fillOpacity:0.95});
        } else if(f.type==='line'){
          shape = L.polyline(f.coords, {color: isSel?'#5ec9c0':color, weight: isSel?3.2:2.4});
        } else {
          shape = L.polygon(f.coords, {color: isSel?'#5ec9c0':color, weight: isSel?3:2, fillColor:color, fillOpacity: isSel?0.3:0.18});
        }
        
        shape.on('click', (e) => {
          if(tool!=='select') return;
          L.DomEvent.stopPropagation(e);
          selection = {layerId:layer.id, featureId:f.id};
          renderAttrPanel(); 
          renderFeatures();
          if(window.innerWidth <= 760) openMobileEditPad(f);
        });
 
        shape.on('mousedown', (e) => {
          if(tool!=='select' || window.innerWidth <= 760) return;
          L.DomEvent.stopPropagation(e);
          selection = {layerId:layer.id, featureId:f.id};
          renderAttrPanel(); renderFeatures();
          map.dragging.disable();
          pushStateToUndo(); 
          dragCtx = {
            mode:'move', feature:f, startLatLng:e.latlng, 
            origCoords:JSON.parse(JSON.stringify(f.coords)), 
            origRect: f.rect?Object.assign({},f.rect):null, 
            origCircle: f.circle?Object.assign({},f.circle):null
          };
        });
 
        shape.addTo(lg);
 
        // إضافة نقاط التحكم والعقد الوصفية التفاعلية
        if(isSel && window.innerWidth > 760) {
          if(f.type==='rectangle') {
            const corners = f.coords;
            const centerLat = (corners[0][0] + corners[2][0]) / 2;
            const centerLng = (corners[0][1] + corners[2][1]) / 2;
            
            const th = toRad(f.rect.rotation);
            const uxN = Math.sin(th), uxE = Math.cos(th);
            const rotatePt = destPoint(centerLat, centerLng, uxE * 0, uxN * 0 + (f.rect.length / 2) + 5);
            
            const rotMarker = L.circleMarker(rotatePt, {radius:9, className:'rect-rotate-marker', color:'#0d2438', weight:1.5, fillColor:'#e8a33d', fillOpacity:1});
            rotMarker.on('mousedown', (se)=>{
              L.DomEvent.stopPropagation(se); map.dragging.disable(); pushStateToUndo();
              dragCtx = { mode:'rect-rotate', feature:f, center:[centerLat, centerLng], origRotation: f.rect.rotation, startAngle: Math.atan2(se.latlng.lat - centerLat, se.latlng.lng - centerLng) };
            });
            rotMarker.addTo(lg);
 
            const scaleMarker = L.circleMarker(corners[2], {radius:9, className:'rect-scale-marker', color:'#0d2438', weight:1.5, fillColor:'#5ec9c0', fillOpacity:1});
            scaleMarker.on('mousedown', (se)=>{
              L.DomEvent.stopPropagation(se); map.dragging.disable(); pushStateToUndo();
              dragCtx = { mode:'rect-scale', feature:f, anchor: corners[0], origWidth: f.rect.width, origLength: f.rect.length, startLatLng: se.latlng };
            });
            scaleMarker.addTo(lg);
          }
 
          if(f.type!=='rectangle' && f.type!=='circle'){
            f.coords.forEach((c,idx)=>{
              const h = L.circleMarker(c, {radius:7, className:'vertex-marker', color:'#5ec9c0', weight:2, fillColor:'#0d2438', fillOpacity:1});
              
              h.on('mousedown', (se)=>{
                L.DomEvent.stopPropagation(se); map.dragging.disable(); pushStateToUndo();
                dragCtx = {mode:'vertex', feature:f, idx};
              });
 
              h.on('contextmenu', (se) => {
                L.DomEvent.stopPropagation(se);
                L.DomEvent.preventDefault(se);
                removeVertexAtIndex(f, idx);
              });
              
              h.addTo(lg);
            });
 
            const limit = f.type === 'polygon' ? f.coords.length : f.coords.length - 1;
            for(let i=0; i<limit; i++) {
              const pA = f.coords[i];
              const pB = f.coords[(i + 1) % f.coords.length];
              const midLat = (pA[0] + pB[0]) / 2;
              const midLng = (pA[1] + pB[1]) / 2;
              const midPoint = L.latLng(midLat, midLng);
 
              const ghost = L.circleMarker(midPoint, {radius:5, className:'vertex-ghost-marker', color:'#5ec9c0', weight:1.5, fillColor:'rgba(18,49,82,0.8)', fillOpacity:1});
              
              ghost.on('mousedown', (se) => {
                L.DomEvent.stopPropagation(se); map.dragging.disable(); pushStateToUndo();
                f.coords.splice(i + 1, 0, [se.latlng.lat, se.latlng.lng]);
                dragCtx = {mode:'vertex', feature:f, idx: i + 1};
                renderFeatures();
              });
 
              ghost.addTo(lg);
            }
          }
        }
      });
    });
  }
 
  /* ---------- Rendering friend (read-only) layers ---------- */
  function renderFriendLayers(){
    // Remove stale friend layer groups from the map
    Object.values(friendLayerGroups).forEach(lg=>{ if(map.hasLayer(lg)) map.removeLayer(lg); });
    friendLayerGroups = {};
 
    friendLayers.forEach(layer=>{
      const lg = L.layerGroup().addTo(map);
      friendLayerGroups[layer.fid + '__' + layer.id] = lg;
      const color = layer.color;
 
      layer.features.forEach(f=>{
        let shape;
        const baseStyle = {color, interactive:false, opacity:0.65};
        if(f.type==='point'){
          shape = L.circleMarker(f.coords[0], Object.assign({}, baseStyle,
            {radius:6, weight:1.5, fillColor:color, fillOpacity:0.45, dashArray:'3 2'}));
        } else if(f.type==='line'){
          shape = L.polyline(f.coords, Object.assign({}, baseStyle, {weight:2.2, dashArray:'7 4'}));
        } else {
          // polygon / rectangle / circle
          shape = L.polygon(f.coords, Object.assign({}, baseStyle,
            {weight:2, fillColor:color, fillOpacity:0.1, dashArray:'7 4'}));
        }
        shape.addTo(lg);
      });
    });
  }
 
  /* ---------- Drag handling ---------- */
  map.on('mousemove', e => {
    document.getElementById('stLat').textContent = e.latlng.lat.toFixed(6);
    document.getElementById('stLng').textContent = e.latlng.lng.toFixed(6);
    
    if(dragCtx) {
      const snapped = dragCtx.mode==='vertex' ? effectiveLatLng(e, dragCtx.feature.id) : e.latlng;
      if(dragCtx.mode==='vertex'){
        dragCtx.feature.coords[dragCtx.idx] = [snapped.lat, snapped.lng];
      } 
      else if(dragCtx.mode==='rect-rotate'){
        const currentAngle = Math.atan2(e.latlng.lat - dragCtx.center[0], e.latlng.lng - dragCtx.center[1]);
        const angleDiff = toDeg(currentAngle - dragCtx.startAngle);
        dragCtx.feature.rect.rotation = Math.round((dragCtx.origRotation - angleDiff) % 360);
        syncRectCoords(dragCtx.feature);
      }
      else if(dragCtx.mode==='rect-scale'){
        const currentDistToAnchor = haversine(dragCtx.anchor[0], dragCtx.anchor[1], e.latlng.lat, e.latlng.lng);
        const startDistToAnchor = haversine(dragCtx.anchor[0], dragCtx.anchor[1], dragCtx.startLatLng.lat, dragCtx.startLatLng.lng);
        const ratio = startDistToAnchor > 0 ? (currentDistToAnchor / startDistToAnchor) : 1;
        
        dragCtx.feature.rect.width = Math.max(0.5, parseFloat((dragCtx.origWidth * ratio).toFixed(1)));
        dragCtx.feature.rect.length = Math.max(0.5, parseFloat((dragCtx.origLength * ratio).toFixed(1)));
        syncRectCoords(dragCtx.feature);
      }
      else if(dragCtx.mode==='move'){
        const dLat = e.latlng.lat - dragCtx.startLatLng.lat;
        const dLng = e.latlng.lng - dragCtx.startLatLng.lng;
        if(dragCtx.feature.type==='rectangle'){
          dragCtx.feature.rect.lat = dragCtx.origRect.lat + dLat;
          dragCtx.feature.rect.lng = dragCtx.origRect.lng + dLng;
          syncRectCoords(dragCtx.feature);
        } else if(dragCtx.feature.type==='circle'){
          dragCtx.feature.circle.lat = dragCtx.origCircle.lat + dLat;
          dragCtx.feature.circle.lng = dragCtx.origCircle.lng + dLng;
          syncCircleCoords(dragCtx.feature);
        } else {
          dragCtx.feature.coords = dragCtx.origCoords.map(c=>[c[0]+dLat, c[1]+dLng]);
        }
      }
      renderFeatures();
    } 
    else if(tool==='rectangle' && rect3Point.step > 0) {
      const snapped = effectiveLatLng(e);
      if(tempLine) { map.removeLayer(tempLine); tempLine = null; }
      
      if(rect3Point.step === 1) {
        const pts = [[rect3Point.pt1.lat, rect3Point.pt1.lng], [snapped.lat, snapped.lng]];
        tempLine = L.polyline(pts, {color:'#e8a33d', weight:2, dashArray:'4 4'}).addTo(map);
        const width = haversine(rect3Point.pt1.lat, rect3Point.pt1.lng, snapped.lat, snapped.lng);
        const angle = Math.atan2(snapped.lat - rect3Point.pt1.lat, snapped.lng - rect3Point.pt1.lng);
        let deg = Math.round(toDeg(angle) % 360); if(deg < 0) deg += 360;
        
        // ميزة الـ Angle Snapping الذكية للغلق على الاتجاهات الرئيسية
        const snapThreshold = 2;
        [0, 90, 180, 270, 360].forEach(targetAngle => {
          if (Math.abs(deg - targetAngle) <= snapThreshold) {
            deg = targetAngle === 360 ? 0 : targetAngle;
          }
        });
 
        document.getElementById('stTemp').textContent = `العرض: ${width.toFixed(1)} م | الزاوية: ${deg}°`;
      } 
      else if(rect3Point.step === 2) {
        const p1 = rect3Point.pt1;
        const p2 = rect3Point.pt2;
        
        const proj = projectPointOnLine(snapped, p1, p2);
        const length = proj.distance;
        const width = haversine(p1.lat, p1.lng, p2.lat, p2.lng);
        const angle = Math.atan2(p2.lat - p1.lat, p2.lng - p1.lng);
        
        const th = angle;
        const uxE = Math.cos(th), uxN = Math.sin(th);
        const uyE = -Math.sin(th), uyN = Math.cos(th);
        
        const dotProduct = (snapped.lng - p1.lng) * (-uxN) + (snapped.lat - p1.lat) * uxE;
        const sideSign = dotProduct >= 0 ? 1 : -1;
        const signedLength = length * sideSign;
        
        const c1 = [p1.lat, p1.lng];
        const c2 = [p2.lat, p2.lng];
        const c3 = destPoint(p2.lat, p2.lng, uyE * signedLength, uyN * signedLength);
        const c4 = destPoint(p1.lat, p1.lng, uyE * signedLength, uyN * signedLength);
        
        tempLine = L.polygon([c1, c2, c3, c4], {color:'#5ec9c0', weight:1.5, fillOpacity:0.12, dashArray:'3 3'}).addTo(map);
        document.getElementById('stTemp').textContent = `العرض: ${width.toFixed(1)} م | الطول: ${length.toFixed(1)} م`;
      }
    }
    else if(drawingCoords && drawingCoords.length){
      const snapped = effectiveLatLng(e);
      if(tempLine){ map.removeLayer(tempLine); }
      const pts = drawingCoords.concat([[snapped.lat, snapped.lng]]);
      tempLine = L.polyline(pts, {color:'#e8a33d', weight:2, dashArray:'6 5'}).addTo(map);
      
      const last = drawingCoords[drawingCoords.length-1];
      const segLen = haversine(last[0],last[1], snapped.lat, snapped.lng);
      document.getElementById('stTemp').textContent = 'طول الضلع: ' + segLen.toFixed(2) + ' م';
    }
  });

      else if(rect3Point.step === 2) {
        const p1 = rect3Point.pt1;

        const proj = projectPointOnLine(snapped, p1, p2);
        const width = haversine(p1.lat, p1.lng, p2.lat, p2.lng);
        const length = proj.distance;
        
        let angle = Math.atan2(p2.lat - p1.lat, p2.lng - p1.lng);
        let deg = Math.round(toDeg(angle) % 360); if(deg < 0) deg += 360;
 
        // قفل مغناطيسي للزاوية في النقطة النهائية أيضاً
        const snapThreshold = 2;
        [0, 90, 180, 270, 360].forEach(targetAngle => {
          if (Math.abs(deg - targetAngle) <= snapThreshold) {
            deg = targetAngle === 360 ? 0 : targetAngle;
          }
        });
 
        const uxN = Math.sin(angle), uxE = Math.cos(angle);
        const dotProduct = (snapped.lng - p1.lng) * (-uxN) + (snapped.lat - p1.lat) * uxE;
        const sideSign = dotProduct >= 0 ? 1 : -1;
        
        rect3Point.finalRect = {
          lat: p1.lat, lng: p1.lng,
          width: parseFloat(width.toFixed(2)),
          length: parseFloat(length.toFixed(2)),
          rotation: deg,
          sideSign: sideSign
        };
 
        document.getElementById('rWidth').value = width.toFixed(1);

        if(tempLine){ map.removeLayer(tempLine); tempLine=null; }
        rect3Point.step = 0;

        document.getElementById('stTemp').textContent = '';
 
        const pt = map.latLngToContainerPoint(snapped);
        const wrapRect = mapEl.getBoundingClientRect();
        const hudX = Math.min(Math.max(pt.x+16,8), wrapRect.width-216);

        rectHud.style.left = hudX+'px'; rectHud.style.top = hudY+'px'; rectHud.style.display='block';
        updateHistoryButtons();
      }
    } 
    else if(tool==='circle'){
      circlePending = {lat:snapped.lat, lng:snapped.lng};
      const pt = map.latLngToContainerPoint(snapped);
      const wrapRect = mapEl.getBoundingClientRect();

  function renderLayerList(){
    const container = document.getElementById('layerList');
    container.innerHTML = '';
 
    // ---- رسوماتي (قابلة للتعديل) ----
    state.layers.forEach(layer=>{
      const row = document.createElement('div');
      row.className = `layer-row ${layer.id===state.activeLayerId?'active':''}`;
      row.addEventListener('click', ()=>{ state.activeLayerId=layer.id; renderLayerList(); });
      
      const swatch = document.createElement('div');
      swatch.className = 'swatch'; swatch.style.background = layer.color;
      swatch.addEventListener('click', e=>{
        L.DomEvent.stopPropagation(e);
        pushStateToUndo();
        const idx = palette.indexOf(layer.color);
        layer.color = palette[(idx+1)%palette.length];
        renderLayerList(); renderFeatures(); scheduleSave();
      });
 
      const nameSpan = document.createElement('span');
      nameSpan.className = 'lname'; nameSpan.textContent = layer.name;
      
      const countSpan = document.createElement('span');
      countSpan.className = 'lcount'; countSpan.textContent = `(${layer.features.length})`;
 
      const visBtn = document.createElement('button');
      visBtn.className = 'icon-btn'; visBtn.innerHTML = layer.visible ? eyeOpenIcon() : eyeClosedIcon();
      visBtn.addEventListener('click', e=>{
        L.DomEvent.stopPropagation(e);
        layer.visible = !layer.visible;
        renderLayerList(); renderFeatures(); scheduleSave();
      });
 
      row.appendChild(swatch); row.appendChild(nameSpan); row.appendChild(countSpan); row.appendChild(visBtn);
      if(state.layers.length > 1){
        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn'; delBtn.innerHTML = trashIcon();
        delBtn.addEventListener('click', e=>{
          L.DomEvent.stopPropagation(e);
          if(confirm(`هل تريد حذف الطبقة "${layer.name}" بجميع عناصرها؟`)){
            pushStateToUndo();
            if(layerGroups[layer.id]) { map.removeLayer(layerGroups[layer.id]); delete layerGroups[layer.id]; }
            state.layers = state.layers.filter(l=>l.id!==layer.id);
            if(state.activeLayerId===layer.id) state.activeLayerId = state.layers[0].id;

  function requestDriveToken(prompt, onSuccess, onFail){
    if(authRequestInFlight){ if(onFail) onFail('busy'); return; }

    const watchdog = setTimeout(()=>{ authRequestInFlight=false; if(onFail) onFail('timeout'); }, 30000);
    tokenClient.callback = (resp)=>{
      clearTimeout(watchdog);
      authRequestInFlight = false;
      if(resp.error || !resp.access_token){
        driveConnected = false;
        if(onFail) onFail(resp.error_description || resp.error || 'no-token');
        return;
      }
      onDriveTokenSuccess(resp);
      if(onSuccess) onSuccess(resp);

    try{ tokenClient.requestAccessToken({prompt}); }
    catch(e){ clearTimeout(watchdog); authRequestInFlight=false; if(onFail) onFail(e.message); }
  }

  function ensureDriveToken(){

          (err)=>{
            if(err !== 'busy' && err !== 'timeout'){ setDriveMsg('انتهت الجلسة — اضغط اتصال', false); }

          }

      };
      tryRequest();

  function buildGeoJSON(){

        if(f.rect) props.rect_info = f.rect;
        if(f.circle) props.circle_info = f.circle;
        let geometry;
        if(f.type === 'point'){
          const c = f.coords[0];
          geometry = {type:'Point', coordinates:[c[1], c[0]]};
        } else if(f.type === 'line'){
          geometry = {type:'LineString', coordinates: f.coords.map(c=>[c[1],c[0]])};
        } else {
          const ring = f.coords.map(c=>[c[1],c[0]]);
          if(ring.length) ring.push(ring[0]);

        }
        features.push({type:'Feature', geometry, properties: props});

    });

    let url, method, body;
    if(state.driveFileId){
      url='https://www.googleapis.com/upload/drive/v3/files/'+state.driveFileId+'?uploadType=multipart';
      method='PATCH'; body=buildMultipart(boundary, {}, content);
    } else {
      url='https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      method='POST'; body=buildMultipart(boundary, {name:'gis-drawing.geojson', mimeType:'application/geo+json'}, content);
    }
    try{
      const res = await fetch(url, {method, headers:{'Authorization':'Bearer '+driveToken, 'Content-Type':'multipart/related; boundary='+boundary}, body});
      const data = await res.json();
      if(data.id){
        state.driveFileId=data.id; lastPushTime=Date.now();
        setDriveMsg('✓ محفوظ في Drive الآن', true);
        scheduleSave();
      } else {
        const errMsg = (data.error && data.error.message) ? data.error.message : JSON.stringify(data);
        setDriveMsg('فشل الرفع: ' + errMsg, true);
        console.error('Drive push error:', data);
      }
    }catch(e){ setDriveMsg('فشل الاتصال بـ Drive: ' + e.message, true); console.error('Drive push exception:', e); }
    drivePushInFlight=false;
  }
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const data = JSON.stringify(buildGeoJSON(), null, 2);
    const blob = new Blob([data], {type:'application/geo+json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    a.href = url;
    a.download = 'gis-drawing-' + stamp + '.geojson';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  });
  document.getElementById('driveConnectBtn').addEventListener('click', ()=>{
    if(!tokenClient){ alert('مكتبة تسجيل الدخول لسه بتحمّل، جرّب تاني بعد ثانية.'); return; }
    if(authRequestInFlight){ return; } // لو في طلب جاري، تجاهل الضغطة
    const prompt = driveConnected ? '' : 'select_account';
    requestDriveToken(prompt,
      ()=>{
        setDriveMsg('متصل — جاري الحفظ...', true);
        pushToDrive();
        state.friendFileIds.forEach(fid=>pullFromFriend(fid, true));
      },
      (err)=>{
        setDriveMsg('فشل تسجيل الدخول — ' + (err||''), false);
      }
    );
  });
  document.getElementById('driveJoinBtn').addEventListener('click', ()=>{
    const id = prompt('الصق File ID بتاع صديقك عشان تشوف رسمه على الخريطة (للعرض فقط، مش هيتعدل):');
    if(!id) return;
    const fid = id.trim();
    if(state.friendFileIds.includes(fid)){ alert('انت متربط بالصديق ده بالفعل.'); return; }
    state.friendFileIds.push(fid); scheduleSave();
    if(!driveConnected){ alert('اضغط "اتصال" كمان عشان تسجل دخول Google Drive.'); }
    else { pullFromFriend(fid, true); }
  });
  document.getElementById('driveCopyIdBtn').addEventListener('click', ()=>{
    if(!state.driveFileId){ alert('لسه معملتش أي حفظ على Drive. اضغط "اتصال" الأول.'); return; }
    navigator.clipboard.writeText(state.driveFileId).then(()=>{
      alert('تم نسخ رقم الملف:\n' + state.driveFileId + '\n\nابعته لزميلك.');
    }).catch(()=>{ alert('رقم الملف:\n' + state.driveFileId); });
  });
  function applyRemoteGeoJSON(geojson, remoteTime){
    if(!geojson || !geojson.features) return;
    const byLayer = {};
    geojson.features.forEach(feat=>{
      const layerName = (feat.properties && feat.properties.layer) || 'طبقة مشتركة';
      if(!byLayer[layerName]) byLayer[layerName]=[];
      byLayer[layerName].push(feat);
    });
    const newLayers = []; let ci=0;
    Object.keys(byLayer).forEach(name=>{
      const existing = state.layers.find(l=>l.name===name);
      const color = existing ? existing.color : palette[ci++%palette.length];
      const visible = existing ? existing.visible : true;
      const features = byLayer[name].map(feat=>{
        const props = Object.assign({}, feat.properties);
        const rectInfo = props.rect_info, circleInfo = props.circle_info;
        delete props.layer; delete props.type; delete props.rect_info; delete props.circle_info;
        let coords, type = feat.properties.type;
        if(feat.geometry.type==='Point'){ type=type||'point'; coords=[[feat.geometry.coordinates[1], feat.geometry.coordinates[0]]]; }
        else if(feat.geometry.type==='LineString'){ type=type||'line'; coords=feat.geometry.coordinates.map(c=>[c[1],c[0]]); }
        else { coords=feat.geometry.coordinates[0].slice(0,-1).map(c=>[c[1],c[0]]); type=type||'polygon'; }
        const nf = {id:uid(), type, coords, attrs: props};
        if(type==='rectangle' && rectInfo){ nf.rect = rectInfo; syncRectCoords(nf); }
        if(type==='circle' && circleInfo){ nf.circle = circleInfo; syncCircleCoords(nf); }
        return nf;
      });
      newLayers.push({id:'L'+name+ci, name, color, visible, features});
    });
    if(newLayers.length){ state.layers = newLayers; if(!getLayer(state.activeLayerId)) state.activeLayerId = state.layers[0].id; }
    state.lastPulledTime = remoteTime; selection=null;
    closeMobileEditPad();
    renderLayerList(); renderFeatures(); renderAttrPanel();
    doSave();
    setDriveMsg('✓ تم تحديث الرسم من زميلك', true);
  }
  /* ---------- Friend read-only data ---------- */
  function applyFriendGeoJSON(fid, geojson, remoteTime){
    if(!geojson || !geojson.features) return;
    const byLayer = {};
    geojson.features.forEach(feat=>{
      const layerName = (feat.properties && feat.properties.layer) || 'طبقة الصديق';
      if(!byLayer[layerName]) byLayer[layerName]=[];
      byLayer[layerName].push(feat);
    });
    const newFriendLayersForThisFriend = []; let ci=0;
    Object.keys(byLayer).forEach(name=>{
      const color = palette[(ci+3) % palette.length]; ci++;
      const features = byLayer[name].map(feat=>{
        const props = Object.assign({}, feat.properties);
        const rectInfo = props.rect_info, circleInfo = props.circle_info;
        delete props.layer; delete props.type; delete props.rect_info; delete props.circle_info;
        let coords, type = feat.properties.type;
        if(feat.geometry.type==='Point'){ type=type||'point'; coords=[[feat.geometry.coordinates[1], feat.geometry.coordinates[0]]]; }
        else if(feat.geometry.type==='LineString'){ type=type||'line'; coords=feat.geometry.coordinates.map(c=>[c[1],c[0]]); }
        else { coords=feat.geometry.coordinates[0].slice(0,-1).map(c=>[c[1],c[0]]); type=type||'polygon'; }
        const nf={id:uid(), type, coords, attrs:props};
        if(type==='rectangle' && rectInfo){ nf.rect=rectInfo; syncRectCoords(nf); }
        if(type==='circle' && circleInfo){ nf.circle=circleInfo; syncCircleCoords(nf); }
        return nf;
      });
      newFriendLayersForThisFriend.push({id:'FR'+name+ci, fid, name, color, features, visible:true});
    });
    state.friendLastPulled[fid] = remoteTime;
    // استبدل طبقات هذا الصديق فقط، واحتفظ بطبقات باقي الأصدقاء
    friendLayers = friendLayers.filter(l=>l.fid!==fid).concat(newFriendLayersForThisFriend);
    renderFriendLayers();
    renderLayerList();
    scheduleSave();
    setDriveMsg('✓ تم تحديث رسم صديقك', true);
  }
 
  let friendPullInFlight = {};
  async function pullFromFriend(fid, force){
    if(!driveConnected || !fid || friendPullInFlight[fid]) return;
    friendPullInFlight[fid] = true;
    try{ await ensureDriveToken(); }catch(e){ friendPullInFlight[fid]=false; return; }
    try{
      const metaRes = await fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?fields=modifiedTime',
        {headers:{'Authorization':'Bearer '+driveToken}});
      const meta = await metaRes.json();
      if(!meta.modifiedTime){ friendPullInFlight[fid]=false; return; }
      const remoteTime = new Date(meta.modifiedTime).getTime();
      if(!force && remoteTime <= (state.friendLastPulled[fid]||0)){ friendPullInFlight[fid]=false; return; }
      const fileRes = await fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media',
        {headers:{'Authorization':'Bearer '+driveToken}});
      const geojson = await fileRes.json();
      if(geojson && geojson.features) applyFriendGeoJSON(fid, geojson, remoteTime);
    }catch(e){ console.error('friend pull failed', e); }
    friendPullInFlight[fid] = false;
  }
 
  driveImportBtn.addEventListener('click', ()=>{
    if(pendingRemote){ applyRemoteGeoJSON(pendingRemote.geojson, pendingRemote.remoteTime); }
    pendingRemote=null; driveUpdateBanner.style.display='none';
  });
  driveDismissBtn.addEventListener('click', ()=>{
    if(pendingRemote){ state.lastPulledTime = pendingRemote.remoteTime; doSave(); }
    pendingRemote=null; driveUpdateBanner.style.display='none';
  });
  async function pullFromDrive(force){
    if(!driveConnected || !state.driveFileId) return;
    try{ await ensureDriveToken(); }catch(e){ return; }
    try{
      const metaRes = await fetch('https://www.googleapis.com/drive/v3/files/'+state.driveFileId+'?fields=modifiedTime', {headers:{'Authorization':'Bearer '+driveToken}});
      const meta = await metaRes.json();
      if(!meta.modifiedTime) return;
      const remoteTime = new Date(meta.modifiedTime).getTime();
      if(!force){
        if(remoteTime <= lastPushTime + 3000) return;
        if(remoteTime <= (state.lastPulledTime||0)) return;
      }
      const fileRes = await fetch('https://www.googleapis.com/drive/v3/files/'+state.driveFileId+'?alt=media', {headers:{'Authorization':'Bearer '+driveToken}});
      const geojson = await fileRes.json();
      if(!geojson || !geojson.features) return;
      if(force){ applyRemoteGeoJSON(geojson, remoteTime); }
      else { pendingRemote = {geojson, remoteTime}; driveUpdateBanner.style.display='flex'; }
    }catch(e){ console.error('pull failed', e); }
  }
  setInterval(()=>{
    if(driveConnected && state.driveFileId) pullFromDrive(false);
    if(driveConnected && state.friendFileIds.length) state.friendFileIds.forEach(fid=>pullFromFriend(fid, false));
  }, 12000);
  const origScheduleSaveForDrive = scheduleSave;
  let drivePushTimer=null;
  scheduleSave = function(){
    origScheduleSaveForDrive();
    if(driveConnected){ clearTimeout(drivePushTimer); drivePushTimer=setTimeout(pushToDrive, 1200); }
  };
 
  loadState();
  tryAutoReconnect(); // بعد loadState عشان state.driveFileId يكون محمّل من localStorage
})();
</script>
